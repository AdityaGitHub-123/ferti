<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | FertiSmart</title>
    <link rel="stylesheet" href="/css/styles.css">
</head>
<body data-page="login">
<main class="auth-wrap">
    <section class="auth-art" style="position: relative; overflow: hidden; padding: 40px; border-radius: 24px; color: #fff; display: flex; flex-direction: column; justify-content: space-between; min-height: 600px; background-color: var(--brand);">
        <img src="https://images.unsplash.com/photo-1595085351336-db1be95a8220?q=80&w=1200&auto=format&fit=crop" alt="Agriculture dashboard" style="position: absolute; top: 0; left: 0; width: 100%; height: 100%; object-fit: cover; z-index: 0;">
        <div style="position: absolute; inset: 0; background: linear-gradient(to top, rgba(0,0,0,0.8) 0%, rgba(0,0,0,0.2) 60%, transparent 100%); z-index: 1;"></div>
        
        <a class="brand" href="/index.html" style="position: relative; z-index: 2; color: #fff;"><span class="brand-mark" style="background: rgba(255,255,255,0.2); backdrop-filter: blur(8px);">FS</span><span>FertiSmart</span></a>
        
        <div style="position: relative; z-index: 2; margin-top: auto;">
            <h1 style="font-size: 3rem; margin: 0 0 16px; letter-spacing: -0.02em; font-weight: 800; line-height: 1.1;">Welcome back</h1>
            <p style="font-size: 1.15rem; color: rgba(255,255,255,0.85); line-height: 1.6; max-width: 380px;">Continue to your soil dashboard, field records, and expert crop insights.</p>
        </div>
    </section>
    <section class="form-card">
        <h1>Login</h1>
        <p class="form-hint">Access your smart agriculture workspace.</p>
        <form class="form" id="loginForm">
            <div class="field">
                <label for="identifier">Email or Username</label>
                <input id="identifier" name="identifier" required autocomplete="username">
            </div>
            <div class="field">
                <label for="password">Password</label>
                <div class="password-field">
                    <input id="password" name="password" type="password" required autocomplete="current-password">
                    <button type="button" class="show-password" data-show-password>Show</button>
                </div>
            </div>
            <div class="error-text"></div>
            <button class="btn primary" type="submit">Login</button>
            <a class="btn ghost" href="/forgot-password.html">Forgot password</a>
            <p class="form-hint">New to FertiSmart? <a href="/signup.html">Create an account</a></p>
        </form>
    </section>
</main>
<div class="toast-stack"></div>
<script src="/js/app.js"></script>
</body>
</html>
